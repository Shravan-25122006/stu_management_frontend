<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — EduManage Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 60%, #1e40af 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow-y: auto;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='4'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            z-index: 0;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 36px 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 1
        }

        .card-top {
            text-align: center;
            margin-bottom: 24px
        }

        .logo {
            width: 58px;
            height: 58px;
            background: linear-gradient(135deg, #1e3a8a, #3b5fc0);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin: 0 auto 12px;
            box-shadow: 0 8px 20px rgba(30, 58, 138, 0.3)
        }

        .card-top h2 {
            font-size: 22px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 4px
        }

        .card-top p {
            font-size: 13px;
            color: #64748b
        }

        /* Role Tabs */
        .role-tabs {
            display: flex;
            gap: 6px;
            background: #f1f5f9;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 24px
        }

        .role-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: #64748b;
            transition: all 0.2s;
            border: none;
            background: none;
            font-family: 'Inter', sans-serif
        }

        .role-tab.active {
            background: #fff;
            color: #1e3a8a;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1)
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px
        }

        .form-group {
            margin-bottom: 14px
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 5px;
            letter-spacing: 0.3px
        }

        input,
        select {
            width: 100%;
            padding: 10px 13px;
            border: 1.5px solid #e2e8f0;
            border-radius: 9px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.2s;
            background: #fff;
            color: #1e293b
        }

        input:focus,
        select:focus {
            border-color: #1e3a8a;
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.08)
        }

        input::placeholder {
            color: #94a3b8
        }

        .pw-wrapper {
            position: relative
        }

        .pw-wrapper input {
            padding-right: 40px
        }

        .pw-toggle {
            position: absolute;
            right: 11px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #94a3b8
        }

        .btn-signup {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #1e3a8a, #3b5fc0);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 6px;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px
        }

        .btn-signup:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(30, 58, 138, 0.35)
        }

        .btn-signup:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none
        }

        .alert {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 14px;
            display: none;
            align-items: center;
            gap: 8px
        }

        .alert.show {
            display: flex
        }

        .alert-error {
            background: #fee2e2;
            color: #dc2626;
            border-left: 3px solid #ef4444
        }

        .alert-success {
            background: #dcfce7;
            color: #16a34a;
            border-left: 3px solid #22c55e
        }

        .divider {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 20px 0
        }

        .login-link {
            text-align: center;
            font-size: 13px;
            color: #64748b
        }

        .login-link a {
            color: #1e3a8a;
            font-weight: 700;
            text-decoration: none
        }

        .required {
            color: #ef4444
        }

        .teacher-fields,
        .student-fields {
            display: none
        }

        .teacher-fields.show,
        .student-fields.show {
            display: block
        }

        @media(max-width:480px) {
            .card {
                padding: 24px 20px
            }

            .form-row {
                grid-template-columns: 1fr
            }
        }

        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="card-top">
            <div class="logo">🏫</div>
            <h2>Sign Up</h2>
            <p>Create your account to start using EduManage Pro</p>
        </div>

        <!-- Role Tabs -->
        <div class="role-tabs">
            <button class="role-tab active" onclick="setRole('student',this)">👩‍🎓 Student</button>
            <button class="role-tab" onclick="setRole('teacher',this)">👨‍🏫 Teacher</button>
        </div>

        <div id="errorMsg" class="alert alert-error"><span>⚠️</span><span id="errorText"></span></div>
        <div id="successMsg" class="alert alert-success"><span>✅</span><span id="successText"></span></div>

        <form id="signupForm" onsubmit="handleSignup(event)">
            <!-- Common Fields -->
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name <span class="required">*</span></label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>Gender <span class="required">*</span></label>
                    <select id="gender" required>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address <span class="required">*</span></label>
                <input type="email" id="email" placeholder="email@example.com" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Password <span class="required">*</span></label>
                    <div class="pw-wrapper">
                        <input type="password" id="password" placeholder="Min 6 characters" required>
                        <button type="button" class="pw-toggle" onclick="togglePw('password')">👁️</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password <span class="required">*</span></label>
                    <div class="pw-wrapper">
                        <input type="password" id="confirmPassword" placeholder="Repeat password" required>
                        <button type="button" class="pw-toggle" onclick="togglePw('confirmPassword')">👁️</button>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="+91 00000 00000">
            </div>

            <!-- Student-only fields -->
            <div class="student-fields show" id="studentFields">
                <div class="form-row">
                    <div class="form-group">
                        <label>Board</label>
                        <select id="board" onchange="filterClasses()">
                            <option value="">All Boards</option>
                            <option value="GSEB">GSEB</option>
                            <option value="CBSE">CBSE</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Medium</label>
                        <select id="medium" onchange="filterClasses()">
                            <option value="">All Mediums</option>
                            <option value="English">English</option>
                            <option value="Gujarati">Gujarati</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Class / Grade <span class="required">*</span></label>
                        <select id="classId" required>
                            <option value="">Loading classes...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Roll Number</label>
                        <input type="text" id="rollNo" placeholder="e.g. S101">
                    </div>
                </div>
                <div class="form-group">
                    <label>Parent Name</label>
                    <input type="text" id="parentName" placeholder="Father or Mother's name">
                </div>
            </div>

            <!-- Teacher-only fields -->
            <div class="teacher-fields" id="teacherFields">
                <div class="form-row">
                    <div class="form-group">
                        <label>Employee ID</label>
                        <input type="text" id="employeeId" placeholder="e.g. T101">
                    </div>
                    <div class="form-group">
                        <label>Qualification</label>
                        <input type="text" id="qualification" placeholder="e.g. B.Ed, M.Sc">
                    </div>
                </div>
                <div class="form-group">
                    <label>Specialization</label>
                    <input type="text" id="specialization" placeholder="e.g. Maths, Science">
                </div>
            </div>

            <button type="submit" class="btn-signup" id="signupBtn">
                <span id="btnText">🚀 Complete Sign Up</span>
            </button>
        </form>

        <hr class="divider">
        <div class="login-link">Already have an account? <a href="login.html">Sign In →</a></div>
        <div style="text-align:center;margin-top:10px">
            <a href="index.html" style="font-size:12px;color:#94a3b8;text-decoration:none">← Back to Home</a>
        </div>
    </div>

    <script>
        let currentRole = 'student';

        function setRole(role, btn) {
            currentRole = role;
            document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('studentFields').classList.toggle('show', role === 'student');
            document.getElementById('teacherFields').classList.toggle('show', role === 'teacher');

            // Update required on classId
            document.getElementById('classId').required = (role === 'student');

            const icons = { student: '🚀 Complete Student Sign Up', teacher: '🚀 Complete Teacher Sign Up' };
            document.getElementById('btnText').textContent = icons[role];
            document.querySelectorAll('.alert').forEach(a => a.classList.remove('show'));
        }

        let allClasses = [];

        // Load classes
        async function loadClasses() {
            const sel = document.getElementById('classId');
            sel.innerHTML = '<option value="">Loading...</option>';
            try {
                const API_BASE = (!window.location.port || window.location.port !== '3000') ? `http://${window.location.hostname || 'localhost'}:3000` : '';
                const res = await fetch(API_BASE + '/api/classes');
                if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
                const data = await res.json();
                if (data.success) {
                    allClasses = data.data;
                    filterClasses();
                } else {
                    sel.innerHTML = '<option value="">Error loading data</option>';
                    console.error('API Error:', data.message);
                }
            } catch (e) {
                console.error('Fetch Error:', e);
                // Fallback to static classes if the backend server is not running
                allClasses = [
                    { id: 1, name: '10th Standard', board: 'GSEB', medium: 'Gujarati' },
                    { id: 2, name: '10th Standard', board: 'GSEB', medium: 'English' },
                    { id: 3, name: '10th Standard', board: 'CBSE', medium: 'English' },
                    { id: 4, name: '12th Science', board: 'GSEB', medium: 'Gujarati' },
                    { id: 5, name: '12th Science', board: 'GSEB', medium: 'English' },
                    { id: 6, name: '12th Science', board: 'CBSE', medium: 'English' },
                    { id: 7, name: 'JEE Preparation', board: 'CBSE', medium: 'English' },
                    { id: 8, name: 'NEET Preparation', board: 'CBSE', medium: 'English' }
                ];
                filterClasses();
            }
        }

        function filterClasses() {
            const sel = document.getElementById('classId');
            const board = document.getElementById('board').value;
            const medium = document.getElementById('medium').value;

            sel.innerHTML = '<option value="">Select Class</option>';

            const filtered = allClasses.filter(c => {
                const matchBoard = board ? c.board === board : true;
                const matchMedium = medium ? c.medium === medium : true;
                return matchBoard && matchMedium;
            });

            if (filtered.length === 0) {
                sel.innerHTML = '<option value="">No classes found</option>';
            } else {
                filtered.forEach(c => {
                    sel.innerHTML += `<option value="${c.id}">${c.name} | ${c.board} | ${c.medium}</option>`;
                });
            }
        }

        function togglePw(id) {
            const inp = document.getElementById(id);
            inp.type = inp.type === 'password' ? 'text' : 'password';
        }

        function showMsg(type, text) {
            document.querySelectorAll('.alert').forEach(a => a.classList.remove('show'));
            document.getElementById(type + 'Text').textContent = text;
            document.getElementById(type + 'Msg').classList.add('show');
            if (type === 'error') {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        async function handleSignup(e) {
            e.preventDefault();
            const btn = document.getElementById('signupBtn');
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (password.length < 6) return showMsg('error', 'Password must be at least 6 characters.');
            if (password !== confirm) return showMsg('error', 'Passwords do not match.');
            if (currentRole === 'student' && !document.getElementById('classId').value) {
                return showMsg('error', 'Please select your Class.');
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> Processing...';

            const body = {
                role: currentRole,
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                password,
                gender: document.getElementById('gender').value,
                phone: document.getElementById('phone').value.trim(),
                // Student fields
                class_id: document.getElementById('classId').value,
                roll_no: document.getElementById('rollNo').value.trim(),
                parent_name: document.getElementById('parentName').value.trim(),
                // Teacher fields
                employee_id: document.getElementById('employeeId').value.trim(),
                qualification: document.getElementById('qualification').value.trim(),
                specialization: document.getElementById('specialization').value.trim(),
            };

            try {
                const API_BASE = (!window.location.port || window.location.port !== '3000') ? `http://${window.location.hostname || 'localhost'}:3000` : '';
                const res = await fetch(API_BASE + '/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();

                if (data.success) {
                    showMsg('success', data.message || 'Account created! Redirecting to login...');
                    document.getElementById('signupForm').reset();
                    btn.innerHTML = '✅ Sign Up Successful!';
                    setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                } else {
                    showMsg('error', data.message || 'Sign up failed.');
                    btn.disabled = false;
                    const icons = { student: '🚀 Complete Student Sign Up', teacher: '🚀 Complete Teacher Sign Up' };
                    btn.innerHTML = `<span id="btnText">${icons[currentRole]}</span>`;
                }
            } catch (err) {
                showMsg('error', 'Server error. Please check your internet connection.');
                btn.disabled = false;
                const icons = { student: '🚀 Complete Student Sign Up', teacher: '🚀 Complete Teacher Sign Up' };
                btn.innerHTML = `<span id="btnText">${icons[currentRole]}</span>`;
            }
        }

        loadClasses();
    </script>
</body>

</html>
