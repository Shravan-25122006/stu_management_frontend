<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — EduManage Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 60%, #1e40af 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow-y: auto;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='4'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            z-index: 0;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 1
        }

        .card-top {
            text-align: center;
            margin-bottom: 32px
        }

        .logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #1e3a8a, #3b5fc0);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 14px;
            box-shadow: 0 8px 20px rgba(30, 58, 138, 0.3)
        }

        .card-top h2 {
            font-size: 24px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 4px
        }

        .card-top p {
            font-size: 13px;
            color: #64748b
        }

        .tabs {
            display: flex;
            gap: 6px;
            background: #f1f5f9;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 28px
        }

        .tab {
            flex: 1;
            padding: 9px;
            text-align: center;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: #64748b;
            transition: all 0.2s;
            border: none;
            background: none
        }

        .tab.active {
            background: #fff;
            color: #1e3a8a;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1)
        }

        .tab:hover:not(.active) {
            color: #1e3a8a
        }

        .form-group {
            margin-bottom: 16px
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 6px
        }

        input,
        select {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 9px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.2s;
            background: #fff;
            color: #1e293b
        }

        input:focus,
        select:focus {
            border-color: #1e3a8a;
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.08)
        }

        input::placeholder {
            color: #94a3b8
        }

        .pw-wrapper {
            position: relative
        }

        .pw-wrapper input {
            padding-right: 42px
        }

        .pw-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 17px;
            color: #94a3b8
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #1e3a8a, #3b5fc0);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Inter', sans-serif
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(30, 58, 138, 0.35)
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none
        }

        .error-msg {
            background: #fee2e2;
            color: #dc2626;
            border-left: 3px solid #ef4444;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 8px
        }

        .error-msg.show {
            display: flex
        }

        .demo-accounts {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0
        }

        .demo-title {
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            text-align: center;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px
        }

        .demo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px
        }

        .demo-btn {
            padding: 8px 4px;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            color: #1e293b
        }

        .demo-btn:hover {
            border-color: #1e3a8a;
            background: #dbeafe;
            color: #1e3a8a
        }

        .demo-btn .demo-icon {
            display: block;
            font-size: 20px;
            margin-bottom: 2px
        }

        .back-home {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 20px;
            color: #64748b;
            font-size: 12px;
            text-decoration: none;
            transition: color 0.2s
        }

        .back-home:hover {
            color: #1e3a8a
        }

        .loader {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="card-top">
            <div class="logo">🏫</div>
            <h2>EduManage Pro</h2>
            <p>Sign in to your account</p>
        </div>

        <!-- Role Tabs -->
        <div class="tabs">
            <button class="tab active" data-role="admin" onclick="setRole('admin', this)">🛡️ Admin</button>
            <button class="tab" data-role="teacher" onclick="setRole('teacher', this)">👨‍🏫 Teacher</button>
            <button class="tab" data-role="student" onclick="setRole('student', this)">👩‍🎓 Student</button>
        </div>

        <div id="errorMsg" class="error-msg">
            <span>⚠️</span><span id="errorText"></span>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="pw-wrapper">
                    <input type="password" id="password" placeholder="Enter your password" required
                        autocomplete="current-password">
                    <button type="button" class="pw-toggle" onclick="togglePw()">👁️</button>
                </div>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">
                <span id="btnText">Sign In</span>
            </button>
        </form>

        <!-- Demo Accounts -->
        <div class="demo-accounts">
            <div class="demo-title">Quick Demo Login</div>
            <div class="demo-grid">
                <div class="demo-btn" onclick="fillDemo('admin@school.com','Admin@123','admin')">
                    <span class="demo-icon">🛡️</span>Admin
                </div>
                <div class="demo-btn" onclick="fillDemo('teacher@school.com','Teacher@123','teacher')">
                    <span class="demo-icon">👨‍🏫</span>Teacher
                </div>
                <div class="demo-btn" onclick="fillDemo('student@school.com','Student@123','student')">
                    <span class="demo-icon">👩‍🎓</span>Student
                </div>
            </div>
        </div>

        <a href="index.html" class="back-home">← Back to Home</a>
        <div style="text-align:center;margin-top:20px;padding-top:15px;border-top:1px dashed #e2e8f0">
            <p style="font-size:14px;color:#64748b;margin-bottom:8px">New to the school?</p>
            <a href="signup.html"
                style="display:inline-block;padding:10px 24px;background:#f1f5f9;color:#1e3a8a;font-weight:800;text-decoration:none;border-radius:8px;border:1.5px solid #1e3a8a;font-size:14px">📝
                Sign Up Now — Create Account</a>
        </div>
    </div>

    <script>
        let currentRole = 'admin';

        function setRole(role, btn) {
            currentRole = role;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('errorMsg').classList.remove('show');
        }

        function togglePw() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function fillDemo(email, pw, role) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = pw;
            document.querySelectorAll('.tab').forEach(t => {
                if (t.dataset.role === role) { t.click(); }
            });
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errMsg = document.getElementById('errorMsg');
            const errText = document.getElementById('errorText');

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> Signing in...';
            errMsg.classList.remove('show');

            try {
                const API_BASE = (!window.location.port || window.location.port !== '3000') ? `http://${window.location.hostname || 'localhost'}:3000` : '';
                const res = await fetch(API_BASE + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();

                if (data.success) {
                    const role = data.user.role;
                    const redirectMap = {
                        admin: 'admin/dashboard.html',
                        teacher: 'teacher/dashboard.html',
                        student: 'student/dashboard.html'
                    };
                    window.location.href = redirectMap[role] || 'index.html';
                } else {
                    errText.textContent = data.message || 'Invalid credentials. Please try again.';
                    errMsg.classList.add('show');
                    btn.disabled = false;
                    btn.innerHTML = '<span id="btnText">Sign In</span>';
                }
            } catch (err) {
                errText.textContent = 'Server error. Make sure the backend is running.';
                errMsg.classList.add('show');
                btn.disabled = false;
                btn.innerHTML = 'Sign In';
            }
        }
    </script>
</body>

</html>
